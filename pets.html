<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pets | Irfan Photography</title>

<style>

body{
  font-family: Inter, system-ui, sans-serif;
  background:#faf8f6;
  color:#1e1e1e;
}

/* HEADER */

header{
  padding:2rem 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:1.5rem;
  border-bottom:1px solid #e9e1da;
}

.logo{
  font-size:1.5rem;
  font-weight:450;
  letter-spacing:-0.02em;
  text-decoration:none;
  color:#1e1e1e;
}

.logo span{
  font-weight:250;
  color:#a28f83;
}

.nav-links{
  display:flex;
  gap:2.5rem;
}

.nav-links a{
  text-decoration:none;
  color:#1e1e1e;
  font-size:0.9rem;
  font-weight:450;
  text-transform:uppercase;
  letter-spacing:1.2px;
  transition:opacity .2s;
}

.nav-links a:hover{
  opacity:0.55;
}

/* PAGE CONTENT */

.container{
  max-width:1400px;
  margin:auto;
  padding:5%;
}

.events-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:1.8rem;
  margin:4rem 0 5rem;
}

.event-item{
  background:#f0e9e3;
  aspect-ratio:4/5;
  width:100%;
  transition:all .2s ease;
  position:relative;
  overflow:hidden;
  background-size:cover;
  background-position:center;
  cursor:pointer;
}

.event-item:hover{
  transform:scale(.98);
  opacity:.9;
}

/* LIGHTBOX */

.lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
  cursor:pointer;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}

</style>
</head>

<body>

<header>
  <a href="index.html" class="logo">
    <span style="font-weight:600;">Irfan Photography</span>
  </a>
  <div class="nav-links">
    <a href="index.html#weddings">weddings</a>
    <a href="nature.html">nature</a>
    <a href="pets.html">pets</a>
    <a href="index.html#about">about</a>
    <a href="index.html#contact">contact</a>
  </div>
</header>

<div class="container">

  <p style="max-width:500px; color:#6f6f6f; margin-bottom:2rem;">
    Pets & candid animal moments. (click image to enlarge)
  </p>

  <div class="events-grid">

    <!-- Replace these with your pet images -->
     
    <div class="event-item" style="background-image:url('images/pets/leosnow.jpeg');"></div>
    <div class="event-item" style="background-image:url('images/pets/leoonstairs.jpeg');"></div>
    <div class="event-item" style="background-image:url('images/pets/louie1.jpeg');"></div> 
    <div class="event-item" style="background-image:url('images/pets/louie3.jpeg');"></div> 
    <div class="event-item" style="background-image:url('images/pets/leopuppycar.jpeg');"></div>
    <div class="event-item" style="background-image:url('images//pets/leobench.jpeg');"></div>  
    <div class="event-item" style="background-image:url('images/pets/gordonjumping.jpeg');"></div>

    
  </div>

</div>

<!-- LIGHTBOX -->

<div class="lightbox" id="lightbox">
  <img id="lightbox-img" src="">
</div>

<script>

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

document.querySelectorAll(".event-item").forEach(item => {

  item.addEventListener("click", () => {

    const bg = item.style.backgroundImage;
    const imgUrl = bg.slice(5, -2);

    lightboxImg.src = imgUrl;
    lightbox.style.display = "flex";

  });

});

lightbox.addEventListener("click", () => {
  lightbox.style.display = "none";
});

</script>

</body>
</html>
